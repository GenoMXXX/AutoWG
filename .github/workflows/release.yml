name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build IPK
        run: python build_ipk.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wg-watchdog_1.0.0_all.ipk

